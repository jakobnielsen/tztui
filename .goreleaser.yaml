version: 2

project_name: tztui

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: tztui
    main: ./cmd/tztui
    binary: tztui
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tztui
    ids:
      - tztui
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: git
  groups:
    - title: "Features"
      regexp: '^feat(\(.+\))?\!?:.+'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?\!?:.+'
      order: 1
    - title: "Documentation"
      regexp: '^docs(\(.+\))?\!?:.+'
      order: 2
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^chore:"
      - "^ci:"
      - "^refactor:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: jakobnielsen
    name: tztui

homebrew_casks:
  - name: tztui
    ids:
      - tztui
    repository:
      owner: jakobnielsen
      name: homebrew-tztui
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/jakobnielsen/tztui"
    description: "A terminal UI for managing and browsing system timezones."
    binaries:
      - tztui
